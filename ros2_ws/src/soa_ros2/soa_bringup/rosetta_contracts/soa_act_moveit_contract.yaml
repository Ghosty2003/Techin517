
robot_type: soa
fps: 100
max_duration_s: 120.0
observations:
 # Wrist USB cam -> model's observation.images.front
 - key: observation.images.front
   topic: /follower/image_raw/compressed
   type: sensor_msgs/msg/CompressedImage
   image:
     resize: [640, 480]
   align: {strategy: hold, stamp: header}
   qos: {reliability: best_effort, history: keep_last, depth: 10}

 # Joint states — global namespace in soa_moveit_bringup (no /follower prefix)
 - key: observation.state
   topic: /joint_states
   type: sensor_msgs/msg/JointState
   selector:
     names:
       - position.shoulder_pan
       - position.shoulder_lift
       - position.elbow_flex
       - position.wrist_flex
       - position.wrist_roll
       - position.gripper
   align: {strategy: hold, stamp: header}
   qos: {reliability: best_effort, history: keep_last, depth: 50}
   unit_conversion: rad2deg

actions:
 # Arm ForwardCommandController — global namespace in soa_moveit_bringup
 - key: action
   publish:
     topic: /arm_fwd_controller/commands
     type: std_msgs/msg/Float64MultiArray
     qos: {reliability: reliable, history: keep_last, depth: 10}
   selector:
     names:
       - position.shoulder_pan
       - position.shoulder_lift
       - position.elbow_flex
       - position.wrist_flex
       - position.wrist_roll
   unit_conversion: rad2deg
   safety_behavior: hold

 # Gripper ForwardCommandController — global namespace in soa_moveit_bringup
 - key: action
   publish:
     topic: /gripper_fwd_controller/commands
     type: std_msgs/msg/Float64MultiArray
     qos: {reliability: reliable, history: keep_last, depth: 10}
   selector:
     names:
       - position.gripper
   unit_conversion: rad2deg
   safety_behavior: hold

recording:
 storage: mcap
