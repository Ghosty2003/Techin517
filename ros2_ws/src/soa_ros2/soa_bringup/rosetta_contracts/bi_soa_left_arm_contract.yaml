
robot_type: soa
fps: 100
max_duration_s: 120.0
observations:
 # Left wrist cam -> model's observation.images.front
 - key: observation.images.front
   topic: /left_follower/image_raw/compressed
   type: sensor_msgs/msg/CompressedImage
   image:
     resize: [640, 480]
   align: {strategy: hold, stamp: header}
   qos: {reliability: best_effort, history: keep_last, depth: 10}

 # Joint states — global namespace, left arm joints prefixed with left_
 - key: observation.state
   topic: /joint_states
   type: sensor_msgs/msg/JointState
   selector:
     names:
       - position.left_shoulder_pan
       - position.left_shoulder_lift
       - position.left_elbow_flex
       - position.left_wrist_flex
       - position.left_wrist_roll
       - position.left_gripper
   align: {strategy: hold, stamp: header}
   qos: {reliability: best_effort, history: keep_last, depth: 50}
   unit_conversion: rad2deg

actions:
 # Left arm ForwardCommandController
 - key: action
   publish:
     topic: /left_arm_fwd_controller/commands
     type: std_msgs/msg/Float64MultiArray
     qos: {reliability: reliable, history: keep_last, depth: 10}
   selector:
     names:
       - position.left_shoulder_pan
       - position.left_shoulder_lift
       - position.left_elbow_flex
       - position.left_wrist_flex
       - position.left_wrist_roll
   unit_conversion: rad2deg
   safety_behavior: hold

 # Left gripper ForwardCommandController
 - key: action
   publish:
     topic: /left_gripper_fwd_controller/commands
     type: std_msgs/msg/Float64MultiArray
     qos: {reliability: reliable, history: keep_last, depth: 10}
   selector:
     names:
       - position.left_gripper
   unit_conversion: rad2deg
   safety_behavior: hold

recording:
 storage: mcap
